version: "3.7"

services:

  app_proxy:
    environment:
      APP_HOST: bionded-store-koel_web_1
      APP_PORT: 80

  web:
    image: phanan/koel:latest
    restart: on-failure
    environment:
      APP_KEY: base64:ZKRgrO71tXQZ8CZlKod5aGzCQfml142fQLzGyJ7BJls=
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: http://localhost
      DB_CONNECTION: mysql
      DB_HOST: bionded-store-koel_db_1
      DB_PORT: "3306"
      DB_DATABASE: koel
      DB_USERNAME: koel
      DB_PASSWORD: koel_umbrel_secret
      FORCE_HTTPS: "false"
      MEMORY_LIMIT: "512"
      MEDIA_PATH: /music
    volumes:
      - ${APP_DATA_DIR}/music:/music
      - ${APP_DATA_DIR}/covers:/var/www/html/public/img/storage
      - ${APP_DATA_DIR}/search-indexes:/var/www/html/storage/search-indexes
    depends_on:
      - db

  db:
    image: mariadb:10.11
    restart: on-failure
    environment:
      MYSQL_ROOT_PASSWORD: koel_root_secret
      MYSQL_DATABASE: koel
      MYSQL_USER: koel
      MYSQL_PASSWORD: koel_umbrel_secret
    volumes:
      - ${APP_DATA_DIR}/db:/var/lib/mysql
